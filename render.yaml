services:
  - type: web
    name: django-recipe-recommender
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn recipe_recommender.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: recipe_recommender.settings
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
